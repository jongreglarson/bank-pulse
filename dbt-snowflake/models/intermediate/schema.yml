version: 2

models:
  - name: int_bank_financials
    description: "Institution financials enriched with derived ratios. Feeds the financial fact table."
    columns:
      - name: cert
        tests:
          - not_null
      - name: report_date
        tests:
          - not_null
      - name: return_on_assets
        description: "Net income / total assets. Null when total assets is zero or null."
      - name: deposit_to_asset_ratio
        description: "Total deposits / total assets."
