version: 2

models:
  - name: stg_financials
    description: "Cleaned and deduplicated per-institution quarterly financials. Mirrors the bundle's silver_financials layer."
    columns:
      - name: cert
        description: "FDIC certificate number."
        tests:
          - not_null
      - name: report_date
        description: "Quarter-end report date."
        tests:
          - not_null
      - name: total_assets
        description: "Total assets in thousands of dollars."
        tests:
          - not_null
