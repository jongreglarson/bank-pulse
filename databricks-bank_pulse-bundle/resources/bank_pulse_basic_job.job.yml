resources:
  jobs:
    bank_pulse_basic_job:
      name: Bank-Pulse Basic Job
      tasks:
        - task_key: Bronze
          disabled: false
          email_notifications: {}
          notebook_task:
            notebook_path: databricks-bank_pulse-bundle/src/01_bronze_ingestion
            source: GIT
          run_if: ALL_SUCCESS
          timeout_seconds: 0
          webhook_notifications: {}
        - task_key: Silver
          depends_on:
            - task_key: Bronze
          disabled: false
          email_notifications: {}
          notebook_task:
            notebook_path: databricks-bank_pulse-bundle/src/02_silver_ingestion
            source: GIT
          run_if: ALL_SUCCESS
          timeout_seconds: 0
          webhook_notifications: {}
        - task_key: Gold
          depends_on:
            - task_key: Silver
          disabled: false
          email_notifications: {}
          notebook_task:
            notebook_path: databricks-bank_pulse-bundle/src/03_gold_metrics
            source: GIT
          run_if: ALL_SUCCESS
          timeout_seconds: 0
          webhook_notifications: {}
      email_notifications:
        no_alert_for_skipped_runs: false
      git_source:
        git_branch: main
        git_provider: gitHub
        git_url: https://github.com/jongreglarson/bank-pulse
      max_concurrent_runs: 1
      performance_target: PERFORMANCE_OPTIMIZED
      queue:
        enabled: true
      timeout_seconds: 0
      webhook_notifications: {}
